<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Carbo Computers</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0d0d0d; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .card { background: #141414; border: 1px solid #1e1e1e; border-radius: 20px; max-width: 420px; width: 100%; padding: 36px 28px; box-shadow: 0 0 40px rgba(0,170,255,0.08); text-align: center; }
    .qr-section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #1e1e1e; }
    .qr-label { font-size: 11px; color: #00aaff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }
    #qrcode { display: flex; justify-content: center; }
    #qrcode img, #qrcode canvas { border-radius: 10px; padding: 10px; background: #ffffff; }
    .logo-wrap { margin-bottom: 20px; }
    .logo-wrap img { width: 140px; height: 140px; object-fit: contain; }
    .company-name { font-size: 24px; font-weight: 700; color: #ffffff; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
    .tagline { font-size: 13px; color: #00aaff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; opacity: 0.85; }
    .divider { border: none; border-top: 1px solid #1e1e1e; margin: 20px 0; }
    .info-block { text-align: left; margin-bottom: 28px; }
    .info-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
    .info-item:last-child { border-bottom: none; }
    .info-icon { font-size: 18px; min-width: 26px; text-align: center; margin-top: 2px; }
    .info-label { font-size: 11px; color: #00aaff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .info-value { font-size: 15px; color: #e0e0e0; }
    .actions { display: flex; flex-direction: column; gap: 12px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none; transition: all 0.2s ease; letter-spacing: 0.3px; }
    .btn-primary { background: #00aaff; color: #000000; }
    .btn-primary:hover, .btn-primary:active { background: #0099ee; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,170,255,0.35); }
    .btn-outline { background: transparent; color: #00aaff; border: 1.5px solid #00aaff; }
    .btn-outline:hover, .btn-outline:active { background: rgba(0,170,255,0.08); transform: translateY(-1px); }
    .btn-ghost { background: #1a1a1a; color: #cccccc; border: 1.5px solid #2a2a2a; }
    .btn-ghost:hover, .btn-ghost:active { background: #222222; transform: translateY(-1px); }
    .btn-icon { font-size: 18px; }
    .footer { margin-top: 28px; font-size: 11px; color: #444; }
    .footer a { color: #555; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="qr-section">
      <p class="qr-label">Scan to add to contacts</p>
      <div id="qrcode"></div>
    </div>
    <div class="logo-wrap">
      <img src="logo.png" alt="Carbo Computers Logo" />
    </div>
    <h1 class="company-name">Carbo Computers</h1>
    <p class="tagline">Your Tech Solution</p>
    <div class="info-block">
      <div class="info-item">
        <div class="info-icon">📍</div>
        <div><div class="info-label">Address</div><div class="info-value">8482 85th Court, Seminole, FL 33777</div></div>
      </div>
      <div class="info-item">
        <div class="info-icon">🕐</div>
        <div><div class="info-label">Hours</div><div class="info-value">Mon – Fri: 8AM – 6PM | Sat: 9AM – 12PM</div></div>
      </div>
    </div>
    <hr class="divider" />
    <div class="actions">
      <a href="tel:+17276075303" class="btn btn-primary"><span class="btn-icon">📞</span> Call (727) 607-5303</a>
      <a href="mailto:info@carbocomputers.com" class="btn btn-outline"><span class="btn-icon">✉️</span> Send an Email</a>
      <a href="https://www.carbocomputers.com" target="_blank" rel="noopener noreferrer" class="btn btn-ghost"><span class="btn-icon">🌐</span> Visit Our Website</a>
    </div>
    <p class="footer">© 2026 Carbo Computers · <a href="https://www.carbocomputers.com">carbocomputers.com</a></p>
  </div>
  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://carbocomp.biz/carbo-computers.vcf",
      width: 160,
      height: 160,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
