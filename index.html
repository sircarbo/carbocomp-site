<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Carbo Computers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0d0d0d; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .card { background: #141414; border: 1px solid #1e1e1e; border-radius: 20px; max-width: 420px; width: 100%; padding: 36px 28px; box-shadow: 0 0 40px rgba(0,170,255,0.08); text-align: center; }
    .logo-wrap { margin-bottom: 20px; }
    .logo-placeholder { width: 100px; height: 100px; border-radius: 50%; background: #1e1e1e; border: 3px solid #00aaff; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 0 20px rgba(0,170,255,0.3); }
    .logo-placeholder span { font-size: 32px; font-weight: 700; color: #00aaff; }
    .company-name { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
    .tagline { font-size: 13px; color: #00aaff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; opacity: 0.85; }
    .divider { border: none; border-top: 1px solid #1e1e1e; margin: 20px 0; }
    .info-block { text-align: left; margin-bottom: 28px; }
    .info-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
    .info-item:last-child { border-bottom: none; }
    .info-icon { font-size: 18px; min-width: 26px; text-align: center; }
    .info-label { font-size: 11px; color: #00aaff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .info-value { font-size: 15px; color: #e0e0e0; }
    .actions { display: flex; flex-direction: column; gap: 12px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none; transition: all 0.2s ease; }
    .btn-primary { background: #00aaff; color: #000; }
    .btn-primary:hover { background: #0099ee; transform: translateY(-1px); }
    .btn-outline { background: transparent; color: #00aaff; border: 1.5px solid #00aaff; }
    .btn-outline:hover { background: rgba(0,170,255,0.08); transform: translateY(-1px); }
    .btn-ghost { background: #1a1a1a; color: #ccc; border: 1.5px solid #2a2a2a; }
    .btn-ghost:hover { background: #222; transform: translateY(-1px); }
    .btn-icon { font-size: 18px; }
    .footer { margin-top: 28px; font-size: 11px; color: #444; letter-spacing: 1px; }
    .footer a { color: #555; text-decoration: none; }
    @media (max-width: 400px) { .card { padding: 28px 20px; } .company-name { font-size: 21px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-placeholder"><span>CC</span></div>
    </div>
    <h1 class="company-name">Carbo Computers</h1>
    <p class="tagline">Your Tech Solution</p>
    <div class="info-block">
      <div class="info-item">
        <div class="info-icon">&#x1F4CD;</div>
        <div><div class="info-label">Address</div><div class="info-value">123 Main Street, City, State 00000</div></div>
      </div>
      <div class="info-item">
        <div class="info-icon">&#x1F550;</div>
        <div><div class="info-label">Hours</div><div class="info-value">Mon - Fri: 9AM - 6PM</div></div>
      </div>
    </div>
    <hr class="divider" />
    <div class="actions">
      <a href="tel:+10000000000" class="btn btn-primary"><span class="btn-icon">&#x1F4DE;</span> Call Us</a>
      <a href="mailto:info@carbocomputers.com" class="btn btn-outline"><span class="btn-icon">&#x2709;</span> Send an Email</a>
      <a href="https://www.carbocomputers.com" target="_blank" rel="noopener noreferrer" class="btn btn-ghost"><span class="btn-icon">&#x1F310;</span> Visit Our Website</a>
    </div>
    <p class="footer">&copy; 2026 Carbo Computers &middot; <a href="https://www.carbocomputers.com">carbocomputers.com</a></p>
  </div>
</body>
</html>
